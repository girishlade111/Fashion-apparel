      <path d="M 155 15 C 185 45, 190 95, 145 120 C 100 145, 55 155, 25 175 C 15 182, 22 192, 32 185 C 55 170, 100 155, 140 130 C 180 105, 178 55, 148 25 Z" fill="url(#g2)"/>
      <path d="M 100 55 C 135 55, 160 75, 155 100 C 150 125, 120 135, 85 140 C 70 142, 65 135, 78 130 C 105 122, 135 110, 138 90 C 140 70, 120 62, 100 65 Z" fill="url(#g1)"/>
      <path d="M 115 85 C 130 88, 138 100, 128 110 C 118 120, 100 118, 95 108 C 90 98, 100 88, 115 85 Z" fill="url(#g1)" opacity="0.8"/>
